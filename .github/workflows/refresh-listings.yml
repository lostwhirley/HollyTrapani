name: Refresh Listings

on:
  schedule:
    # Run every 6 hours: 5am, 11am, 5pm, 11pm EST
    - cron: '0 10 * * *'
    - cron: '0 16 * * *'
    - cron: '0 22 * * *'
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-listings:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install requests

      - name: Refresh listings from API
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python3 scripts/refresh_listings.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 \
            libxrandr2 libgbm1 libpango-1.0-0 \
            libcairo2 libnss3 libnspr4 \
            libasound2 libasound2t64 || true

      - name: Install Node dependencies
        working-directory: puppeteer
        run: npm install

      - name: Check if listings changed
        id: listings_changed
        run: |
          if git diff --quiet holly-sells-homes/all-listings.json holly-sells-homes/listings.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate flyers
        if: steps.listings_changed.outputs.changed == 'true'
        working-directory: puppeteer
        run: node generate-listing-flyers.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add holly-sells-homes/all-listings.json \
                  holly-sells-homes/listings.json \
                  holly-sells-homes/sold-listings.json \
                  holly-sells-homes/reviews.json

          if [ "${{ steps.listings_changed.outputs.changed }}" == "true" ]; then
            git add flyers/output/ flyers/index.html
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: refresh listings, flyers, and videos [skip ci]"
            git fetch origin main
            git rebase origin/main
            git push
          fi
