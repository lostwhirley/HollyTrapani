name: Refresh Listings

on:
  schedule:
    # Run daily at 10:00 AM UTC (5:00 AM ET)
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-listings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Refresh listings from API
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python3 scripts/refresh_listings.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add holly-sells-homes/all-listings.json holly-sells-houses/all-listings.json
            git commit -m "chore: update listings from API [skip ci]"
            git push
          fi
