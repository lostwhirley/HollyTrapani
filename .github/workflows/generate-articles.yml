name: Generate Weekly Real Estate Articles

on:
  schedule:
    - cron: '0 15 * * 1'   # Every Monday at 15:00 UTC (11:00 AM EST / 10:00 AM EDT)
  workflow_dispatch:         # Allow manual trigger for testing

jobs:
  generate-articles:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Allow commit and push
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Generate articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_articles.py

      - name: Commit and push articles.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles.json
          git diff --staged --quiet || git commit -m "chore: update weekly real estate articles [skip ci]"
          git push
