<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holly Trapani | Real Estate Agent | Ave Maria, FL</title>
  <meta name="description" content="Holly Trapani is a dedicated real estate agent in Ave Maria, Florida. Explore her listings and expertise in Southwest Florida real estate.">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Jost', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100%;
      overflow: hidden;
    }

    .splash-screen {
      text-align: center;
      opacity: 1;
      animation: fadeIn 0.8s ease-in;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .splash-screen h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 5rem;
      font-weight: 400;
      font-style: italic;
      color: #ffffff;
      line-height: 1.2;
      margin-bottom: 2rem;
      letter-spacing: 2px;
    }

    .splash-screen p {
      font-size: 1.2rem;
      color: #b8860b;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .loading-dots {
      margin-top: 3rem;
      font-size: 1.5rem;
      color: #ffffff;
      letter-spacing: 0.5rem;
    }

    .dot {
      display: inline-block;
      animation: pulse 1.4s infinite;
    }

    .dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes pulse {
      0%, 60%, 100% {
        opacity: 0.3;
      }
      30% {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="splash-screen">
    <h1>Holly Trapani</h1>
    <p>Real Estate Professional</p>
    <div class="loading-dots">
      <span class="dot">•</span>
      <span class="dot">•</span>
      <span class="dot">•</span>
    </div>
  </div>

  <script>
    // Redirect to holly-sells-homes after 3.5 seconds
    setTimeout(function() {
      window.location.href = './holly-sells-homes/';
    }, 3500);
  </script>
</body>
</html>
